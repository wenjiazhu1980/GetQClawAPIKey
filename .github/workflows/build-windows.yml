name: Build Windows CLI

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Bundle & Package
        run: npm run build:win

      - name: Upload get-qclaw.exe
        uses: actions/upload-artifact@v4
        with:
          name: get-qclaw
          path: dist/get-qclaw.exe
          retention-days: 30

      # -------- Release (push to main / workflow_dispatch only) --------
      - name: Delete old latest-win release
        if: github.event_name != 'pull_request'
        run: |
          gh release delete latest-win --yes --cleanup-tag 2>$null
          exit 0
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create latest-win tag
        if: github.event_name != 'pull_request'
        run: |
          git tag -f latest-win
          git push -f origin latest-win

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-win
          name: "GetQClaw CLI — Latest Windows Build"
          body: |
            ## Windows 命令行工具（带 TUI 交互菜单）

            从已登录的 QClaw 客户端提取 API Key，查看模型列表和积分余额。**单文件 .exe，无需安装 Node.js。**

            ### 安装与使用

            1. 下载 `get-qclaw.exe`
            2. 双击进入交互菜单，选择功能即可
            3. 也支持命令行直接调用

            ```
            get-qclaw.exe key [--key-only]
            get-qclaw.exe models [--json]
            get-qclaw.exe balance [--json] [--records] [--tokens] [--date=2026-07-06]
            ```

            ### 前置条件

            - 已安装 QClaw 客户端并完成登录
            - 以当前登录用户身份运行（DPAPI 绑定用户会话）

            > 构建自 commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            >
            > macOS 版本：[latest](https://github.com/${{ github.repository }}/releases/latest)
          files: dist/get-qclaw.exe
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
